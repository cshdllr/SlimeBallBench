<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SlimeBallBench — League Table</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="wrap">
  <header class="site">
    <a href="index.html" class="title">SlimeBallBench</a>
    <nav>
      <a href="index.html" class="active">Standings</a>
      <a href="stats.html">Statistics</a>
    </nav>
  </header>

  <h1 id="seasonName">League Table</h1>
  <p class="sub" id="seasonSub"></p>

  <div id="content"></div>

  <footer class="site">
    Headless physics · identical prompts · replays rendered from logged frames ·
    Made by <a href="https://jasoncashdollar.com">Jason Cashdollar</a>
  </footer>
</div>

<script>
async function load() {
  let season;
  try {
    season = await (await fetch("season.json")).json();
  } catch (e) {
    document.getElementById("content").innerHTML =
      `<div class="notice">Couldn't load <code>season.json</code>.
       ${location.protocol === "file:"
         ? "This page is open as a <code>file://</code> — browsers block loading data that way. "
         : ""}
       Serve this folder over HTTP and open it through the server:<br><br>
       <code>python3 -m http.server 8000</code><br>
       then visit <code>http://localhost:8000/index.html</code>.
       <br><br>(If you haven't run a season yet: <code>python season.py</code> first.)</div>`;
    return;
  }

  document.getElementById("seasonName").textContent = season.season_name;
  const s = season.settings;
  document.getElementById("seasonSub").textContent =
    `${season.models.length} teams · ${season.matches.length} matches played · ` +
    `${s.match_duration_seconds}s games · format: ${s.format}`;

  // Scales for the inline bars: points relative to the leader, GD relative to
  // the largest swing in either direction (so the diverging bars share one scale).
  const maxPts = Math.max(1, ...season.standings.map(r => r.points));
  const maxGd = Math.max(1, ...season.standings.map(r => Math.abs(r.gd)));

  // Recent form per team: results in chronological order, newest last.
  const form = {};
  for (const r of season.standings) form[r.id] = [];
  const played = [...season.matches]
    .filter(m => m.played_at)
    .sort((a, b) => String(a.played_at).localeCompare(String(b.played_at)));
  for (const m of played) {
    const [hg, ag] = m.score;
    if (form[m.home]) form[m.home].push(hg > ag ? "W" : hg < ag ? "L" : "D");
    if (form[m.away]) form[m.away].push(ag > hg ? "W" : ag < hg ? "L" : "D");
  }
  const formCell = id => {
    const seq = (form[id] || []).slice(-6);
    if (!seq.length) return '<span class="meta">—</span>';
    return `<span class="form">${seq.map(x => `<i class="${x}" title="${x}">${x}</i>`).join("")}</span>`;
  };

  const gdBar = gd => {
    const w = Math.abs(gd) / maxGd * 50; // up to half the track each side
    const side = gd > 0 ? "pos" : gd < 0 ? "neg" : "";
    const label = (gd >= 0 ? "+" + gd : gd);
    return `<div class="divwrap">
        <div class="dtrack"><div class="axis"></div>
          ${gd ? `<div class="dbar ${side}" style="width:${w}%"></div>` : ""}</div>
        <span class="dval ${side}">${label}</span></div>`;
  };

  const rows = season.standings.map(r => `
    <tr class="clickable${r.rank === 1 ? ' leader' : ''}" onclick="location.href='model.html?id=${r.id}'">
      <td class="pos">${r.rank}</td>
      <td class="team-cell">
        <span class="swatch" style="background:${r.color}"></span>
        <span class="name">${r.name}</span>
        <span class="meta">&nbsp;${r.abbrev} · ${r.provider}</span>
      </td>
      <td>${r.played}</td><td>${r.w}</td><td>${r.d}</td><td>${r.l}</td>
      <td>${r.gf}</td><td>${r.ga}</td>
      <td class="barcell">${gdBar(r.gd)}</td>
      <td>${formCell(r.id)}</td>
      <td class="barcell"><div class="barwrap">
        <div class="bar" style="width:${r.points / maxPts * 100}%;background:${r.color}"></div>
        <span class="val">${r.points}</span></div></td>
    </tr>`).join("");

  document.getElementById("content").innerHTML = `
    <table>
      <thead><tr>
        <th>#</th><th>Team</th><th>P</th><th>W</th><th>D</th><th>L</th>
        <th>GF</th><th>GA</th><th>GD</th><th>Form</th><th class="barcell">Pts</th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table>
    <p class="sub" style="margin-top:14px">Tap a team to see its schedule and stats.
       Points: win 3, draw 1. Ties broken by goal difference, then goals for.
       Bars scale to the leader; <b>GD</b> diverges from zero; <b>Form</b> shows the last six results (newest right).</p>`;
}
load();
</script>
</body>
</html>
